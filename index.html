<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Virtual AOMA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* (Los estilos son los mismos que antes, no los repito para no alargar, pero mantén los que ya tienes) */
        /* Reutiliza los estilos de la versión anterior */
    </style>
</head>
<body>
    <!-- (La estructura HTML es la misma, solo cambia el script) -->
    <!-- ... (todo el HTML igual) ... -->
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============================================
        // CONFIGURACIÓN SUPABASE
        // ============================================
        const SUPABASE_URL = 'https://irvacaxwrzaouqzwwxlq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlydmFjYXh3cnphb3Vxend3eGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NjQ4MzUsImV4cCI6MjA5OTU0MDgzNX0.D-NR-o7NzJ0RaJqZ7xYyMm6fgAwlg0_l-SFQr4voNCA';

        let supabaseClient;
        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase conectado');
        } catch(e) {
            console.error('❌ Error al conectar Supabase:', e);
            alert('Error de conexión con Supabase.');
        }

        let currentUser = null;
        let currentPage = 'inicio';

        // (Todas las funciones auxiliares: togglePassword, obtenerUsuariosAprobados, etc. son iguales que antes)
        // Solo modifico handleRegistro y la parte de mostrarApp para reconocer 'admin'

        // ============================================
        // REGISTRO (CORREGIDO - primer usuario = admin)
        // ============================================
        async function handleRegistro(e) {
            e.preventDefault();
            console.log('📝 Registrando...');

            const nombre = document.getElementById('regNombre').value.trim();
            const dni = document.getElementById('regDni').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const telefono = document.getElementById('regTelefono').value.trim();
            const empresa = document.getElementById('regEmpresa').value;
            const actividad = document.getElementById('regActividad').value;
            const rolSeleccionado = document.getElementById('regRol').value; // 'afiliado', 'delegado', 'dirigente'
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const pregunta = document.getElementById('regPregunta').value;
            const respuesta = document.getElementById('regRespuesta').value.trim();

            if (!nombre || !dni || !email || !username || !password || !empresa || !actividad || !rolSeleccionado || !pregunta || !respuesta) {
                alert('Todos los campos marcados con * son obligatorios.');
                return;
            }
            if (password.length < 6) { alert('La contraseña debe tener al menos 6 caracteres.'); return; }

            try {
                // Verificar si ya existe email o username
                const { data: existentes } = await supabaseClient
                    .from('usuarios')
                    .select('id')
                    .or(`email.eq.${email},username.eq.${username}`);
                
                if (existentes && existentes.length > 0) {
                    alert('❌ Ese email o usuario ya está registrado.');
                    return;
                }

                // Verificar si hay algún usuario aprobado (para saber si es el primero)
                const { data: aprobados } = await supabaseClient
                    .from('usuarios')
                    .select('id')
                    .eq('aprobado', true);
                
                const esPrimerUsuario = !aprobados || aprobados.length === 0;

                // Si es el primer usuario, FORZAR rol = 'admin', ignorando lo que eligió
                const rolFinal = esPrimerUsuario ? 'admin' : rolSeleccionado;

                const nuevoUsuario = {
                    username: username,
                    email: email,
                    password: password,
                    nombre: nombre,
                    dni: dni,
                    telefono: telefono,
                    empresa: empresa,
                    actividad: actividad,
                    rol: rolFinal,
                    aprobado: esPrimerUsuario, // el primero se aprueba automáticamente
                    pregunta_seguridad: pregunta,
                    respuesta_seguridad: respuesta
                };

                await guardarUsuario(nuevoUsuario);
                
                if (esPrimerUsuario) {
                    alert('✅ Registro completado como Administrador. Ahora podés iniciar sesión.');
                } else {
                    alert('📩 Registro enviado. Esperá la aprobación del administrador.');
                }
                
                cerrarModalRegistro();
                document.getElementById('formRegistro').reset();
                mostrarLogin();
                
            } catch (error) {
                console.error('Error en registro:', error);
                alert('❌ Error al registrar: ' + error.message);
            }
        }

        // ============================================
        // LOGIN (sin cambios)
        // ============================================
        async function handleLogin(e) {
            e.preventDefault();
            const identifier = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            try {
                const { data, error } = await supabaseClient
                    .from('usuarios')
                    .select('*')
                    .or(`username.eq.${identifier},email.eq.${identifier}`)
                    .eq('password', password)
                    .eq('aprobado', true);

                if (error) throw error;

                if (data && data.length > 0) {
                    currentUser = data[0];
                    localStorage.setItem('aoma_session', JSON.stringify(currentUser));
                    mostrarApp();
                } else {
                    document.getElementById('loginError').textContent = '❌ Usuario o contraseña incorrectos, o tu cuenta no ha sido aprobada aún.';
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch (error) {
                console.error('Error en login:', error);
                document.getElementById('loginError').textContent = '❌ Error de conexión: ' + error.message;
                document.getElementById('loginError').style.display = 'block';
            }
        }

        // ============================================
        // MOSTRAR APP (reconocer admin)
        // ============================================
        function mostrarApp() {
            document.getElementById('loginOverlay').style.display = 'none';
            document.querySelector('.header').style.display = 'flex';
            document.querySelector('.main').style.display = 'block';
            document.getElementById('userMenu').style.display = 'flex';

            if (!currentUser) return;

            document.getElementById('userName').textContent = currentUser.nombre;
            // Determinar rol mostrado
            const roleText = currentUser.rol === 'admin' ? 'Administrador' :
                             currentUser.rol === 'dirigente' ? 'Dirigente' : 'Delegado';
            document.getElementById('userRole').textContent = roleText;
            document.getElementById('userAvatar').textContent = currentUser.nombre.split(' ').map(n => n[0]).join('').toUpperCase();
            
            const adminLink = document.getElementById('adminPanelLink');
            if (adminLink) {
                // Permitir admin si rol es 'admin' (también 'administrador' por si acaso)
                adminLink.style.display = (currentUser.rol === 'admin' || currentUser.rol === 'administrador') ? 'block' : 'none';
            }
            
            navigateTo('inicio');
        }

        // ============================================
        // PANEL DE USUARIOS (Admin) - reconoce admin
        // ============================================
        async function mostrarPanelUsuarios() {
            if (currentUser.rol !== 'admin' && currentUser.rol !== 'administrador') {
                alert('Solo el administrador puede acceder a este panel.');
                return;
            }
            document.getElementById('modalPanelUsuarios').style.display = 'flex';
            await actualizarListasUsuarios();
        }

        // ============================================
        // RECUPERACIÓN DE SESIÓN
        // ============================================
        async function initSession() {
            const session = localStorage.getItem('aoma_session');
            if (session) {
                try {
                    const user = JSON.parse(session);
                    const { data } = await supabaseClient
                        .from('usuarios')
                        .select('*')
                        .eq('id', user.id)
                        .eq('aprobado', true)
                        .single();
                    if (data) {
                        currentUser = data;
                        mostrarApp();
                        return;
                    }
                } catch (e) {
                    console.log('Sesión inválida');
                }
                localStorage.removeItem('aoma_session');
            }
            mostrarLogin();
        }

        // (El resto de funciones son iguales: obtenerUsuariosAprobados, guardarUsuario, actualizarUsuario, eliminarUsuarioDB, y todas las de renderizado. Asegúrate de mantenerlas.)

        // ============================================
        // EVENTOS
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('formRegistro').addEventListener('submit', handleRegistro);
            document.getElementById('formRecuperacion').addEventListener('submit', handleRecuperacion);
            
            // Chat simple
            document.getElementById('chatForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const input = document.getElementById('chatInput');
                const msg = input.value.trim();
                if (!msg) return;
                const container = document.getElementById('chatMessages');
                container.innerHTML += `<div style="background:#f47b20;color:white;padding:0.5rem 0.75rem;border-radius:8px;margin-bottom:0.5rem;align-self:flex-end;max-width:80%;">${msg}</div>`;
                setTimeout(() => {
                    container.innerHTML += `<div style="background:#f3f4f6;padding:0.5rem 0.75rem;border-radius:8px;margin-bottom:0.5rem;max-width:80%;">🤖 Gracias por tu consulta. Un asesor te responderá pronto.</div>`;
                    container.scrollTop = container.scrollHeight;
                }, 500);
                input.value = '';
                container.scrollTop = container.scrollHeight;
            });
            
            initSession();
        });

        // ============================================
        // FUNCIONES GLOBALES (modales, toggleTheme, etc.)
        // ============================================
        // (Mantén todas las que ya tenías: cerrarModalRegistro, mostrarRegistro, etc.)
        // ...
    </script>
</body>
</html>
