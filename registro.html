<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro | Campus AOMA</title>

<link rel="stylesheet" href="css/registro.css">

</head>

<body>

<div class="contenedor">

<div class="card">

<div class="logo">

<h1>CAMPUS AOMA</h1>

<p>Seccional San Juan</p>

</div>

<form id="formRegistro">

<div class="grupo">

<label>Nombre</label>

<input
type="text"
id="nombre"
required>

</div>

<div class="grupo">

<label>Apellido</label>

<input
type="text"
id="apellido"
required>

</div>

<div class="grupo">

<label>DNI</label>

<input
type="text"
id="dni"
required>

</div>

<div class="grupo">

<label>Email</label>

<input
type="email"
id="email"
required>

</div>

<div class="grupo">

<label>Teléfono</label>

<input
type="text"
id="telefono">

</div>

<div class="grupo">

<label>Rol</label>

<select id="rol">

<option value="">Seleccione...</option>

<option value="Delegado">

Delegado

</option>

<option value="Dirigente">

Dirigente

</option>

</select>

</div>

<div class="grupo">

<label>Empresa</label>

<select id="empresa">

<option value="">Seleccione...</option>

<option value="Sin asignar">

Sin asignar

</option>

</select>

</div>

<div class="grupo">

<label>Convenio</label>

<select id="convenio">

<option value="">Seleccione...</option>

<option value="Sin asignar">

Sin asignar

</option>

</select>

</div>

<div class="grupo">

<label>Contraseña</label>

<input
type="password"
id="password"
required>

</div>

<div class="grupo">

<label>Confirmar contraseña</label>

<input
type="password"
id="confirmar"
required>

</div>

<button
type="submit"
class="boton">

REGISTRARME

</button>

<div
id="mensaje"
class="mensaje">

</div>

</form>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/config.js"></script>

<script src="js/registro.js"></script>

</body>

</html>
